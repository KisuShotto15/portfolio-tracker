<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Round black background -->
  <circle cx="50" cy="50" r="50" fill="#000"/>

  <!-- KS letters with glow -->
  <text
    x="50" y="63"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="42"
    text-anchor="middle"
    fill="white"
    filter="url(#glow)"
    clip-path="url(#circle-clip)"
  >KS</text>

  <!-- 4-pointed star bottom-right -->
  <g clip-path="url(#circle-clip)" opacity="0.75">
    <path d="M84 84 L85.5 80.5 L87 84 L90.5 85.5 L87 87 L85.5 90.5 L84 87 L80.5 85.5 Z" fill="white"/>
  </g>
</svg>
